<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="description" content="Sistema de Gestión GPS" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@200..800&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&family=Russo+One&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GPS Manager">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-512.png" />
    <link rel="icon" href="%PUBLIC_URL%/icon-512.png" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Sistema de Gestión GPS</title>
  </head>
  <style>
    #splash{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease;}
    #splash.hide{opacity:0;pointer-events:none;}
    #splash img{width:140px;height:auto;}
  </style>
  <body>
    <noscript>Necesitas habilitar JavaScript para usar esta aplicación.</noscript>
    <div id="splash"><img src="%PUBLIC_URL%/logo_solo.svg" alt="Cargando..." /></div>
    <div id="root"></div>
    <script>
      window.addEventListener('load',function(){
        setTimeout(function(){
          var s=document.getElementById('splash');
          if(s){s.classList.add('hide');setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},500);}
        },400);
      });
    </script>
    
    <!-- Librerías para exportar PDF y JPG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </body>
</html>
